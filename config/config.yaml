# configuration of model hyperparams in training.py
common:
  dataset_name: 'placeholder'
  lr: 0.00005             # Reduced from 1e-4 to slow down early convergence
  weight_decay: 0.15      # Increased from 0.10 for stronger L2 regularization
  eval_interval: 1        # Evaluate every x epoch
  focal_gamma: 2.0        # Focal Loss focusing parameter (0 = CE, higher = more focus on hard samples)
  loss_dice_weight: 0.35  # Composite loss: soft Dice term weight
  loss_boundary_weight: 0.20  # Composite loss: boundary CE term weight
  loss_boundary_dilation: 1   # Boundary mask dilation radius for boundary term
  patience: 25            # Slightly more patience to let slower LR explore
  use_amp: true           # Enable mixed precision (will auto-disable on CPU)
  label_smoothing: 0.1    # Label smoothing to prevent overconfident predictions
  scheduler:
    T_0: 10               # Longer warm restart period (was 5) — slower LR decay
    T_mult: 2
    eta_min: 0.000005     # Lower floor LR
  warmup_epochs: 5        # Longer warmup (was 2) — gradual ramp prevents early memorization
  grad_clip: 0.5          # mixed precision settings
  gradient_accumulation_steps: 2
  cv_folds: 1             # Default number of folds for cross-validation (0 = disabled)
  vis_samples: 8         # Number of samples to visualize in final eval
  early_stop_metric: eval  # evaluation-class-only
  exclude_class0_in_metrics: true  # Compute metrics/plots on foreground classes only
  max_train_batches_per_epoch: 320  # 0 -> full batch in a epoch
  save_topk_models: 3
  eval_boundary_band_dilation: 2
  class_weight_max_sample_patches: 10000   # 0 -> counts all train patches
  class_weight_max_sample_pixels: 5000000  # 0 -> no sampling inside patches
  class_weight_sample_seed: 350234

lora:
  lora_dropout: 0.2
  lora_rank: 16
  lora_alpha: 32
  merge_lora_for_inference: false

split:
  split_seed: 350234  # Patient-level split random seed; vary it for robust multi-seed evaluation.
  # Split ratios for patient-level split-first pipeline.
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  # Legacy compatibility (analyzer/cv helper still reads these keys).
  test_rate: 0.1
  val_rate: 0.1
  n_folds: 5  # Number of folds for cross-validation (0 = disabled, use hold-out)
  batch_size: 256  # This refers to the size on a single GPU.
  samples_per_step: 2  # Number of samples stacked per iteration; each sample contributes all its patches.
  target_patches_per_step: 1024  # Total patch target per optimization step (global across GPUs in cached mode).
  max_patches_per_sample_chunk: 0  # 0 => auto derive from target_patches_per_step and memory budget.
  patch_size: 31  # Pixel size of image patches.
  eval_batch_size: 256  # Smaller eval batch size for CPU training
  sampler_mode: hsi_adaptive  # fixed | adaptive | hsi_adaptive
  sampler_mix_fg: 0.16  # FG vs boundary relative mix (renormalized, no BG pool)
  sampler_mix_boundary: 0.05  # FG vs boundary relative mix (renormalized, no BG pool)
  sampler_target_mix_fg: 0.16  # Adaptive target for FG mix (renormalized with boundary)
  sampler_target_mix_boundary: 0.05  # Adaptive target for boundary mix
  sampler_adapt_momentum: 0.9
  sampler_diversity_strength: 0.75  # Group-diversity penalty strength for hsi_adaptive
  sampler_fg_ratio_min: 0.08
  sampler_fg_ratio_max: 0.22
  sampler_fg_inverse_pow: 1.0
  sampler_fg_min_per_class: 8
  min_boundary_centers_per_patient: 128
  min_fg_centers_per_patient: 3000
  boundary_sampling_dilation: 2
  boundary_include_fg_edges: true

preprocess:
  # Cache/split pipeline controls
  enable_split_cache_pipeline: true
  force_rebuild_split_cache: false
  train_patch_augment: true
  split_preprocess_workers: 4

  # Train-only fitting controls
  pca_components: 48  # Number of PCA components to retain.
  fit_on_foreground_only: false  # false => fit normalization/PCA on FG + sampled class-0 pixels.
  class0_sample_ratio: 1.0  # When fit_on_foreground_only=false, class-0 samples ~= fg_count * ratio.
  max_fit_samples: 2000000
  max_pca_samples: 500000

memory:
  pin_memory: true  # true is faster but may cause memoleak in distant server.
  num_workers: 4  # Workers on single GPU. More memory usage to accelerate data loading.
  parallel_gpu: 4  # Number of parallel GPU device. This influence many worker params.
  prefetch_factor: 4  # Prefetch batches to speed up training.
  cached_loader_num_workers: 4
  cached_loader_prefetch_factor: 2
  cached_loader_persistent_workers: true
  cached_loader_patch_budget_mb: 512
  benchmark: false  # Fixed input shape; enabling cuDNN benchmark improves kernel selection.

path:
  data: /data/chenhaoran/bishe/fisher
  label: /data/chenhaoran/bishe/fisher
  output: /home/chenhaoran/LoLA_hsViT/output

rgb:
  path:
    data: /data/chenhaoran/bishe/rgb
    label: /data/chenhaoran/bishe/fisher
  preprocess:
    in_channels: 3
  split:
    split_seed: 350234
    train_ratio: 0.8
    val_ratio: 0.1
    test_ratio: 0.1
    test_rate: 0.1
    val_rate: 0.1
    n_folds: 5
    patch_size: 31
    batch_size: 128
    eval_batch_size: 128
    boundary_sampling_dilation: 1

# hereby only declares front targets, except BG.
clsf:
  num: 3
  targets:
    - 'PG'   # ⭐Parathyroid gland
    - 'Tra'  # Trachea (boundary hard example for PG)
    - 'TG'   # ⭐Thyroid gland
  label_remap: [0, 1, 2, 3]  # raw(BG/PG/Tra/TG) -> remap(BG/PG/Tra/TG)
  strict_label_remap: true
  unknown_label_policy: error  # error | map_to_class0

