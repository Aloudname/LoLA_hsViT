# central configuration for the refactored segmentation pipeline.

path:
  hsi_dir: "./data/fisher" # used in pipeline.dataset._discover_hsi_samples to locate hsi .npy files.
  label_dir: "./data/fisher" # used in pipeline.dataset._discover_hsi_samples to locate *_gt.npy files.
  rgb_dir: "./data/rgb" # used in pipeline.dataset._discover_hsi_samples to locate rgb comparison images.
  output_dir: "./outputs" # used in pipeline.core.Pipeline to create timestamped experiment folders.

data:
  num_classes: 4 # used in dataset/analyzer/trainer for segmentation label space.
  class_names: ["background", "parathyroid", "trachea", "thyroid"] # used in analyzer and visualize for reports.
  hsi_bands: 96 # used in dataset synthetic generation and hsi input checks.
  patch_size: 63 # used in pipeline.dataset._iter_patch_positions.
  stride: 32 # used in pipeline.dataset._iter_patch_positions.
  foreground_ratio_threshold: 0.03 # used in pipeline.dataset._should_keep_patch.
  track_sample_ratio: 0.30 # used in pipeline.dataset._compute_tracking_stats.
  split:
    train: 0.70 # used in pipeline.dataset._split_subjects.
    eval: 0.15 # used in pipeline.dataset._split_subjects.
    test: 0.15 # used in pipeline.dataset._split_subjects.
    seed: 3407 # used in pipeline.dataset and pipeline.core for deterministic behavior.
  preprocess:
    mode: "none" # used in pipeline.dataset.SpectralReducer; options: none, supervised_pca, lda_pca.
    output_dim: 32 # used in spectral reducer and hsi model input channels for method b.
    max_fit_pixels: 250000 # used in reducer fit sampling budget.

augment:
  enable_train_aug: true # used in pipeline.dataset.BasePatchDataset.__getitem__.
  flip_prob: 0.10 # used in pipeline.dataset._apply_augment.
  rotate_prob: 0.10 # used in pipeline.dataset._apply_augment.
  noise_prob: 0.10 # used in pipeline.dataset._apply_augment.
  noise_std: 0.01 # used in pipeline.dataset._apply_augment.
  spectral_shift_prob: 0.10 # used in pipeline.dataset._apply_augment.
  spectral_shift_std: 0.01 # used in pipeline.dataset._apply_augment.
  band_drop_prob: 0.02 # used in pipeline.dataset._apply_augment.

model:
  family: "hsi_adapter" # used in pipeline.core._build_model.
  spectral_dim: 32 # used in model.hsi_adapter.HSIAdapter.
  embed_dim: 128 # used in all model backbones.
  depth: 4 # used in transformer encoder depth.
  num_heads: 4 # used in multi-head attention layers.
  mlp_ratio: 4.0 # used in transformer feed-forward width.
  decoder_dim: 96 # used in decoder channels.
  dropout: 0.10 # used in backbone and decoder.
  freeze_backbone: true # used in model constructors for overfitting control.

train:
  epochs: 10 # used in pipeline.trainer.Trainer.fit.
  batch_size: 8 # used in train dataloader.
  eval_batch_size: 8 # used in eval/test dataloaders.
  num_workers: 0 # used in dataloader worker setup.
  lr: 0.0003 # used in optimizer construction.
  weight_decay: 0.0001 # used in optimizer construction.
  grad_clip: 1.0 # used in trainer backward step.
  grad_accum_steps: 1 # used in trainer gradient accumulation.
  amp: false # used in trainer mixed precision switch.
  ema_decay: 0.999 # used in trainer ema update.
  max_train_steps_per_epoch: 0 # used in trainer to optionally cap train steps.
  max_eval_steps: 0 # used in trainer to optionally cap eval steps.

loss:
  dice_weight: 0.40 # used in composite segmentation loss.
  focal_weight: 0.40 # used in composite segmentation loss.
  tversky_weight: 0.20 # used in composite segmentation loss.
  focal_gamma: 2.0 # used in focal loss.
  tversky_alpha: 0.70 # used in tversky loss.
  tversky_beta: 0.30 # used in tversky loss.
  class_weights: [0.20, 3.00, 1.50, 1.20] # used in focal/cross-entropy weighting.

runtime:
  seed: 3407 # used in pipeline.core._seed_everything.
  device: "auto" # used in pipeline.trainer device selection.
  save_top_k: 1 # used in trainer checkpoint policy.

visualization:
  num_seg_examples: 3 # used in pipeline.visualize.show_segmentation.
  tsne_max_points: 3000 # used in pipeline.visualize.plot_tsne.
  spectral_max_points_per_class: 2000 # used in pipeline.visualize.plot_spectral.

export:
  export_onnx: true # used in pipeline.core.Pipeline._export_onnx.
  onnx_opset: 17 # used in torch.onnx.export.

experiments:
  default_models: # used in run.py when --models is omitted.
    - "hsi_adapter_learnable"
    - "hsi_adapter_lda"
    - "rgb_vit"
    - "unet"
