# configuration of model hyperparams in training.py
common:
  dataset_name: 'placeholder'
  lr: 0.00005             # Reduced from 1e-4 to slow down early convergence
  weight_decay: 0.15      # Increased from 0.10 for stronger L2 regularization
  eval_interval: 2        # Evaluate every x epoch
  focal_gamma: 2.0        # Focal Loss focusing parameter (0 = CE, higher = more focus on hard samples)
  patience: 25            # Slightly more patience to let slower LR explore
  use_amp: true           # Enable mixed precision (will auto-disable on CPU)
  label_smoothing: 0.1    # Label smoothing to prevent overconfident predictions
  scheduler:
    T_0: 10               # Longer warm restart period (was 5) — slower LR decay
    T_mult: 2
    eta_min: 0.000005     # Lower floor LR
  warmup_epochs: 5        # Longer warmup (was 2) — gradual ramp prevents early memorization
  grad_clip: 0.5          # mixed precision settings
  gradient_accumulation_steps: 2
  cv_folds: 1             # Default number of folds for cross-validation (0 = disabled)
  vis_samples: 8         # Number of samples to visualize in fin eval
  use_hierarchical_loss: true
  fg_loss_weight: 1.0
  bgfg_loss_weight: 0.5
  early_stop_metric: composite  # composite | fg | all
  metric_weight_fg: 0.5
  metric_weight_all: 0.5
lora:
  lora_dropout: 0.2
  lora_rank: 16
  lora_alpha: 32
  merge_lora_for_inference: false
split:
  split_seed: 350234  # Patient-level split random seed; vary it for robust multi-seed evaluation.
  test_rate: 0.1 # Test set ratio (held out completely from training)
  val_rate: 0.1 # Validation set ratio (from train+val pool, used for early stopping)
  n_folds: 5  # Number of folds for cross-validation (0 = disabled, use hold-out)
  batch_size: 256  # This refers to the size on a single GPU.
  patch_size: 31  # Pixel size of image patches.
  eval_batch_size: 256  # Smaller eval batch size for CPU training
  pg_center_boost: 1.4  # >1 increases sampling frequency of PG-centered patches.
  pg_tg_boundary_boost: 1.8  # >1 emphasizes PG<->TG boundary hard examples.
  boundary_pair: ['PG', 'TG']  # Dynamic boundary hard-mining pair by class names.
preprocess:
  pca_components: 48  # Number of PCA components to retain.
  fit_on_non_bg_only: false  # false => fit normalization/PCA on FG + sampled BG for better BG/FG separation.
  bg_sample_ratio: 1.0  # When fit_on_non_bg_only=false, BG samples ~= fg_count * ratio.
memory:
  pin_memory: true  # true is faster but may cause memoleak in distant server.
  num_workers: 4  # Workers on single GPU. More memory usage to accelerate data loading.
  parallel_gpu: 4  # Number of parallel GPU device. This influence many worker params.
  prefetch_factor: 4  # Prefetch batches to speed up training.
  benchmark: false  # Enable DataLoader benchmark mode for fixed-size inputs.
path:
  data: /data/chenhaoran/bishe/fisher
  label: /data/chenhaoran/bishe/fisher
  output: /home/chenhaoran/LoLA_hsViT/output
# hereby only declares front targets, except BG.
clsf:
  num: 3
  targets:
    - 'PG'   # ⭐Parathyroid gland
    - 'Tra'  # Trachea (boundary hard example for PG)
    - 'TG'   # ⭐Thyroid gland
  label_remap: [0, 1, 2, 3]  # raw(BG/PG/Tra/TG) -> remap(BG/PG/Tra/TG)
  strict_label_remap: true
  unknown_label_policy: error  # error | map_to_bg

